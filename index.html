                        <div class="volume-container">
                            <i class="fas fa-volume-up" id="mute-btn"></i>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.2">
                        </div>
                        <span class="song-title">assumptions</span>
                        <div style="width: 24px;"></div> <!-- Spacer for flex balance -->
                    </div>

                    <div class="progress-container">
                        <span id="current-time">00:00</span>
                        <div class="progress-bar-bg" id="progress-bar-bg">
                            <div class="progress-fill" id="progress-fill"></div>
                            <div class="progress-thumb" id="progress-thumb"></div>
                        </div>
                        <span id="total-time">03:37</span>
                    </div>

                    <div class="audio-controls">
                        <div class="play-btn-container" id="play-pause-btn">
                            <i class="fas fa-play" id="play-icon"></i>
                        </div>
                    </div>

    <!-- Audio element for background music. Replace src with your own audio file or link -->
    <audio id="bg-music" loop>
